name: Wiki Lint
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap a temp project and validate
        run: |
          python3 skills/knowledge-system-bootstrap/scripts/bootstrap_knowledge_system.py /tmp/test-output "CI Test"
          cd /tmp/test-output
          python3 scripts/wiki_check.py
          python3 scripts/raw_manifest_check.py
          python3 scripts/untracked_raw_check.py

      - name: Verify --dry-run works
        run: |
          python3 skills/knowledge-system-bootstrap/scripts/bootstrap_knowledge_system.py /tmp/dry-test "Dry Test" --dry-run | grep "Would create 21 files"

      - name: Verify demo manifest is valid
        run: |
          cd examples/demo-project
          # Check CSV header matches expected columns
          head -1 manifests/raw_sources.csv | grep -q "source_id,company,vendor,kind,filename,raw_rel_path,status,compiled_into,notes"
